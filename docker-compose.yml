version: "3.8"

services:
  piratebay-movies:
    build: .
    container_name: piratebaymovies
    restart: no
    environment:
      DATABASE_URL: ${DATABASE_URL}
      #IP: ${IP}
      QBITIP: ${QBITIP}
      QBITUSER: ${QBITUSER}
      QBITPASS: ${QBITPASS}
      HA_WEBHOOK_URL: ${HA_WEBHOOK_URL} #triggering next app after complting current app tasks
      RADARR_URL: ${RADARR_URL}
      RADARR_API_KEY: ${RADARR_API_KEY}
      SONARR_URL: ${SONARR_URL}
      SONARR_API_KEY: ${SONARR_API_KEY}
      HA_WEBHOOKERROR_URL: ${HA_WEBHOOKERROR_URL}
      OMDB_API_KEY: ${OMDB_API_KEY}
    dns:
      - 1.1.1.1
      - 1.0.0.1





